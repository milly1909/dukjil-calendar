<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 덕질 캘린더 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Cormorant+Garamond:wght@400;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f5ee;
  --surface: #ffffff;
  --surface2: #f0f2e8;
  --border: #e2e5d4;
  --border2: #c8ccb4;
  --text: #1a1c14;
  --text2: #5a5e48;
  --text3: #9a9e88;
  --accent: #C1E145;
  --accent-dark: #6e8a00;
  --accent-dim: rgba(193,225,69,0.18);
  --accent-text: #2a3600;
  --holiday: #d63b3b;
  --holiday-jp: #c4889e;
  --holiday-cn: #c49060;
  --today-bg: #C1E145;
  --today-text: #2a3600;
  --sat: #3a7bd5;
  --sun: #d63b3b;
  --event-bg: rgba(193,225,69,0.13);
  --event-border: #a8cc1a;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  text-align: center;
  padding: 52px 20px 36px;
  position: relative;
  background: var(--surface);
  border-bottom: 3px solid var(--accent);
}
.header-stars {
  font-size: 0.75rem;
  letter-spacing: 0.6em;
  color: var(--text3);
  margin-bottom: 12px;
  font-family: 'DM Mono', monospace;
}
.header-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3.2rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 6px;
}
.header-title span {
  background: var(--accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-sub {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--text3);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-bottom: 24px;
}
.member-legend {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.member-chip {
  font-size: 0.7rem;
  padding: 5px 14px;
  border: 1.5px solid var(--border2);
  border-radius: 20px;
  color: var(--text2);
  background: var(--surface);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.18s ease;
  user-select: none;
  flex-shrink: 0;
}
.member-chip:hover {
  border-color: var(--accent-dark);
  background: var(--accent-dim);
  color: var(--accent-text);
}
.member-chip.active {
  border-color: var(--accent-dark);
  background: var(--accent);
  color: var(--accent-text);
  font-weight: 500;
}
.filter-hint {
  font-family: 'DM Mono', monospace;
  font-size: 0.56rem;
  color: var(--text3);
  margin-top: 12px;
  letter-spacing: 0.08em;
}

/* ── 오늘의 정보 버튼 ── */
.today-btn {
  margin-top: 16px;
  padding: 10px 28px;
  background: var(--accent);
  color: var(--accent-text);
  border: none;
  border-radius: 24px;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.18s ease;
  box-shadow: 0 2px 12px rgba(193,225,69,0.35);
}
.today-btn:hover {
  background: #d4f55a;
  transform: translateY(-1px);
  box-shadow: 0 4px 18px rgba(193,225,69,0.5);
}
.today-btn:active { transform: translateY(0); }

/* ── 오늘의 정보 모달 섹션 ── */
.daily-section { margin-bottom: 18px; }
.daily-section-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* ── 응원 문구 카드 ── */
.message-card {
  background: var(--accent);
  border-radius: 14px;
  padding: 20px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.message-card::before {
  content: '✦';
  position: absolute;
  top: 8px; left: 14px;
  font-size: 0.6rem;
  color: rgba(42,54,0,0.3);
}
.message-card::after {
  content: '✦';
  position: absolute;
  bottom: 8px; right: 14px;
  font-size: 0.6rem;
  color: rgba(42,54,0,0.3);
}
.message-text {
  font-size: 0.92rem;
  font-weight: 500;
  color: var(--accent-text);
  line-height: 1.7;
  word-break: keep-all;
  font-family: 'Noto Sans KR', sans-serif;
}
.message-refresh {
  margin-top: 10px;
  font-size: 0.6rem;
  color: rgba(42,54,0,0.5);
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  letter-spacing: 0.06em;
  display: inline-block;
}
.message-refresh:hover { color: var(--accent-text); }
.event-row.hidden { display: none; }

/* ── 오늘의 한마디 카드 ── */
.todayword-section { margin-bottom: 18px; }
.todayword-section-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.todayword-wrap {
  border-radius: 16px;
  padding: 22px 20px 18px;
  position: relative;
  overflow: hidden;
  text-align: center;
}
.todayword-deco {
  position: absolute;
  font-size: 5rem;
  opacity: 0.07;
  pointer-events: none;
  line-height: 1;
  user-select: none;
}
.todayword-deco.tl { top: -10px; left: 6px; }
.todayword-deco.br { bottom: -10px; right: 6px; }
.todayword-emoji {
  font-size: 2.2rem;
  line-height: 1;
  margin-bottom: 12px;
  display: block;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.12));
}
.todayword-text {
  font-size: 0.93rem;
  font-weight: 500;
  line-height: 1.9;
  word-break: keep-all;
  white-space: pre-line;
  font-family: 'Noto Sans KR', sans-serif;
}
.todayword-refresh {
  margin-top: 12px;
  font-size: 0.58rem;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.06em;
  display: inline-block;
  opacity: 0.45;
  transition: opacity 0.15s;
}
.todayword-refresh:hover { opacity: 0.9; }
.todayword-loading {
  background: var(--surface2);
  border: 1.5px dashed var(--border2);
  border-radius: 14px;
  padding: 18px;
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--text3);
  letter-spacing: 0.04em;
}

/* ── STICKY NAV ── */
.month-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 5px;
  padding: 10px 24px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
@media (max-width: 640px) {
  .month-nav {
    flex-wrap: nowrap;
    justify-content: flex-start;
    overflow-x: auto;
    padding: 10px 14px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .month-nav::-webkit-scrollbar { display: none; }
}
.month-pill {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  font-weight: 400;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border2);
  background: transparent;
  color: var(--text3);
  text-decoration: none;
  transition: all 0.18s ease;
  cursor: pointer;
  letter-spacing: 0.04em;
  flex-shrink: 0;
  white-space: nowrap;
}
.month-pill:hover {
  border-color: var(--accent-dark);
  color: var(--accent-text);
  background: var(--accent-dim);
}
.month-pill.active {
  border-color: var(--accent-dark);
  background: var(--accent);
  color: var(--accent-text);
  font-weight: 500;
}

/* ── CALENDAR GRID ── */
.calendar-container {
  max-width: 1480px;
  margin: 0 auto;
  padding: 32px 24px 60px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
@media (max-width: 1100px) {
  .calendar-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  .calendar-container { grid-template-columns: 1fr; padding: 16px 12px 40px; gap: 16px; }
}

/* ── MONTH CARD ── */
.month-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  scroll-margin-top: 72px;
}

.month-header {
  padding: 20px 28px 16px;
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
}
.month-accent-bar {
  width: 6px; height: 36px;
  background: var(--accent);
  border-radius: 3px;
  flex-shrink: 0;
}
.month-name-en {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.02em;
  line-height: 1;
}
.month-name-kr {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--text3);
  margin-top: 2px;
}
.month-num {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--text3);
  margin-left: auto;
  letter-spacing: 0.1em;
}

/* ── DAY GRID ── */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 10px;
  gap: 3px;
}
.dow-label {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  font-weight: 400;
  letter-spacing: 0.08em;
  padding: 8px 0 6px;
  color: var(--text3);
}
.dow-label.sun { color: var(--sun); }
.dow-label.sat { color: var(--sat); }

.day-cell {
  height: 90px;
  overflow: hidden;
  padding: 5px 5px 6px;
  border-radius: 10px;
  vertical-align: top;
  transition: background 0.12s;
  cursor: default;
}
@media (max-width: 1100px) {
  .day-cell { height: 80px; }
}
.day-cell.has-event { cursor: pointer; }
.day-cell:not(.empty):hover { background: var(--surface2); }
.day-cell.empty { pointer-events: none; }

.day-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 2px;
  margin-bottom: 2px;
}
.day-num {
  font-family: 'DM Mono', monospace;
  font-size: 0.82rem;
  font-weight: 400;
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  line-height: 1;
}
.day-cell.today .day-num {
  background: var(--today-bg);
  color: var(--today-text);
  font-weight: 700;
}
.day-cell.sun-col .day-num { color: var(--sun); }
.day-cell.sat-col .day-num { color: var(--sat); }
.day-cell.holiday .day-num { color: var(--holiday) !important; }
.day-cell.today .day-num { color: var(--today-text) !important; }

.lunar-txt { display: none; }

.holiday-label {
  font-size: 0.48rem;
  color: var(--holiday);
  font-weight: 400;
  line-height: 1.3;
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.holiday-label.jp { color: var(--holiday-jp); }
.holiday-label.cn { color: var(--holiday-cn); }
.event-row {
  font-size: 0.48rem;
  font-weight: 400;
  line-height: 1.35;
  background: var(--event-bg);
  border-left: 2px solid var(--event-border);
  border-radius: 4px;
  padding: 2px 4px;
  margin-top: 2px;
  cursor: pointer;
}
.event-row:hover { background: rgba(193,225,69,0.28); }
.event-title-line {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
  color: var(--text);
}
.event-members {
  font-size: 0.54rem;
  line-height: 1;
  margin-top: 1px;
  display: block;
}

/* ── 오늘 날짜 반짝이 효과 ── */
@keyframes sparkle {
  0%   { box-shadow: 0 0 0 0 rgba(193,225,69,0.8), 0 0 0 0 rgba(193,225,69,0.4); }
  50%  { box-shadow: 0 0 8px 4px rgba(193,225,69,0.5), 0 0 16px 8px rgba(193,225,69,0.2); }
  100% { box-shadow: 0 0 0 0 rgba(193,225,69,0.8), 0 0 0 0 rgba(193,225,69,0.4); }
}
@keyframes starPop {
  0%,100% { opacity:0.3; transform: scale(0.8); }
  50%      { opacity:1;   transform: scale(1.2); }
}
.day-cell.today {
  animation: sparkle 2s ease-in-out infinite;
  cursor: pointer !important;
}
.day-cell.today .day-num {
  background: var(--today-bg);
  color: var(--today-text);
  font-weight: 700;
  position: relative;
}
.today-star {
  font-size: 0.38rem;
  position: absolute;
  animation: starPop 1.4s ease-in-out infinite;
  pointer-events: none;
  line-height: 1;
}

/* ── 날씨 표시 ── */
.weather-mini {
  font-size: 0.46rem;
  margin-top: 2px;
  display: flex;
  align-items: center;
  gap: 3px;
  color: var(--text2);
  font-family: 'DM Mono', monospace;
}
.weather-icon { font-size: 0.7rem; }

/* ── 날씨 모달 ── */
.weather-card {
  background: linear-gradient(135deg, #f0f8e8 0%, #e8f4f0 100%);
  border: 1.5px solid var(--accent-dark);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
}
.weather-title {
  font-size: 0.62rem;
  font-family: 'DM Mono', monospace;
  color: var(--accent-dark);
  letter-spacing: 0.1em;
  margin-bottom: 10px;
  font-weight: 500;
}
.weather-main {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.weather-big-icon { font-size: 2.4rem; line-height: 1; }
.weather-temp-now {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  line-height: 1;
}
.weather-sky {
  font-size: 0.72rem;
  color: var(--text2);
  margin-top: 2px;
}
.weather-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.weather-item {
  background: rgba(255,255,255,0.7);
  border-radius: 8px;
  padding: 7px 10px;
}
.weather-item-label {
  font-size: 0.55rem;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  margin-bottom: 2px;
}
.weather-item-value {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text);
}
.weather-compare-pos { color: #d63b3b; }
.weather-compare-neg { color: #3a7bd5; }
.weather-loading {
  text-align: center;
  padding: 20px;
  font-size: 0.72rem;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.05em;
}


.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(30,35,10,0.5);
  backdrop-filter: blur(6px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border: 1.5px solid var(--border2);
  border-radius: 22px;
  padding: 30px;
  max-width: 440px;
  width: 100%;
  position: relative;
  animation: modalIn 0.2s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  max-height: 88vh;
  overflow-y: auto;
}
@keyframes modalIn {
  from { opacity:0; transform: translateY(14px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
.modal-date {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--text3);
  letter-spacing: 0.15em;
  margin-bottom: 6px;
}
.modal-holiday {
  font-size: 0.72rem;
  color: var(--holiday);
  margin-bottom: 14px;
}
.modal-event {
  background: var(--event-bg);
  border-left: 3px solid var(--event-border);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 10px;
}
.modal-event-title {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.5;
  word-break: keep-all;
  margin-bottom: 8px;
}
.modal-event-members {
  font-size: 1rem;
  letter-spacing: 0.1em;
}
.modal-close {
  position: absolute;
  top: 16px; right: 18px;
  background: var(--surface2);
  border: 1.5px solid var(--border2);
  border-radius: 50%;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 0.75rem;
  color: var(--text2);
  transition: all 0.15s;
}
.modal-close:hover { background: var(--accent); color: var(--accent-text); border-color: var(--accent-dark); }

/* ── MOBILE ── */
@media (max-width: 640px) {
  header { padding: 32px 16px 24px; }
  .header-title { font-size: 2.2rem; }
  .header-sub { font-size: 0.56rem; }
  .member-legend { gap: 6px; overflow-x: auto; flex-wrap: nowrap; justify-content: flex-start; padding: 0 4px; scrollbar-width: none; }
  .member-legend::-webkit-scrollbar { display: none; }
  .member-chip { font-size: 0.64rem; padding: 4px 10px; }

  .calendar-container { padding: 16px 12px 40px; gap: 16px; }
  .month-card { border-radius: 16px; scroll-margin-top: 60px; }
  .month-header { padding: 14px 16px 12px; }
  .month-name-en { font-size: 1.4rem; }
  .month-accent-bar { width: 5px; height: 28px; }

  .cal-grid { padding: 6px; gap: 2px; }
  .dow-label { font-size: 0.52rem; padding: 5px 0 4px; }
  .day-cell { height: 72px; padding: 3px 3px 4px; }
  .day-num { font-size: 0.72rem; width: 22px; height: 22px; }
  .holiday-label { font-size: 0.42rem; }
  .event-row { font-size: 0.42rem; padding: 1px 3px; }
  .event-members { font-size: 0.48rem; }
}

footer {
  text-align: center;
  padding: 28px;
  border-top: 1.5px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--text3);
  letter-spacing: 0.2em;
  background: var(--surface);
}
</style>
</head>
<body>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<header>
  <div class="header-title">나만의 <span>덕질 캘린더</span></div>
  <div class="header-sub">2026 · NCT DREAM · Schedule Tracker</div>
  <div class="member-legend" id="memberLegend"></div>
  <div class="filter-hint" id="filterHint">멤버를 눌러 필터링할 수 있어요</div>
  <button class="today-btn" onclick="openDailyModal()">✦ 오늘의 정보 보기</button>
</header>

<nav class="month-nav" id="monthNav"></nav>

<div class="calendar-container" id="calContainer"></div>

<footer>✦ 2026 덕질 캘린더 ✦</footer>

<script>
// ── MEMBERS ──
const MEMBERS = {
  '마크': '🐯',
  '런쥔': '🦊',
  '제노': '🐶',
  '해찬': '🐻',
  '재민': '🐰',
  '천러': '🐬',
  '지성': '🐹'
};

// ── KOREAN HOLIDAYS 2026 ──
const HOLIDAYS = {
  '2026-01-01': '신정',
  '2026-02-16': '설날 연휴',
  '2026-02-17': '설날',

// 구글 시트 '오늘의문구' 로드 (기존 Apps Script 연동, 1시간 캐시)
async function loadDailyMessages() {
  const now = Date.now();
  if (DAILY_MESSAGES.length > 0 && now - _dailyMsgsCacheTime < DAILY_MSGS_CACHE_TTL) {
    return DAILY_MESSAGES;
  }
  try {
    const res = await fetch(SHEETS_URL + '?type=todayword');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) throw new Error('빈 데이터');
    DAILY_MESSAGES = data;
    _dailyMsgsCacheTime = now;
  } catch(e) {
    console.warn('오늘의문구 로딩 실패:', e);
    if (DAILY_MESSAGES.length === 0) {
      DAILY_MESSAGES = [{ text:'오늘도 드림과 함께 빛나는 하루 보내요 ✨', member:'💚', condition:'' }];
    }
  }
  return DAILY_MESSAGES;
}

// ── 조건 매칭 알고리즘 ──
function _matchSingleCond(cond, ctx) {
  const c = cond.trim();
  if (!c) return false;
  const { today, weatherCode, isDay, evts } = ctx;
  const month = today.getMonth() + 1;
  const day   = today.getDate();
  const dow   = today.getDay(); // 0=일,1=월,...,6=토
  const lastDayOfMonth = new Date(today.getFullYear(), month, 0).getDate();

  // ── 요일 매칭 ──
  const dowMap = { '일요일':0,'월요일':1,'화요일':2,'수요일':3,'목요일':4,'금요일':5,'토요일':6 };
  if (c in dowMap) return dow === dowMap[c];

  // ── X월초/중/말 ──
  const mPeriod = c.match(/^(\d+)월(초|중|말)$/);
  if (mPeriod) {
    if (month !== parseInt(mPeriod[1])) return false;
    if (mPeriod[2] === '초') return day >= 1  && day <= 10;
    if (mPeriod[2] === '중') return day >= 11 && day <= 20;
    if (mPeriod[2] === '말') return day >= 21 && day <= lastDayOfMonth;
  }
  // ── 월초/중/말 (해당 월 무관) ──
  if (c === '월초') return day >= 1  && day <= 10;
  if (c === '월중') return day >= 11 && day <= 20;
  if (c === '월말') return day >= 21 && day <= lastDayOfMonth;

  // ── X월 Y일 (정확히 일치) ──
  const exactDate = c.match(/^(\d+)월\s*(\d+)일$/);
  if (exactDate) return month === parseInt(exactDate[1]) && day === parseInt(exactDate[2]);

  // ── 날씨 매칭 (WMO 코드 기반) ──
  if (weatherCode !== null) {
    const isRain = (weatherCode >= 51 && weatherCode <= 82);
    const isSnow = (weatherCode >= 71 && weatherCode <= 77);
    if (c === '비' || c.includes('비')) return isRain;
    if (c === '눈' || c.includes('눈')) return isSnow;
    if (c === '맑음') return weatherCode <= 2;
    if (c === '흐림') return weatherCode === 3;
  }

  // ── 일정 매칭: 이모지/키워드 포함 여부 ──
  if (c.includes('일정에') || c.includes('일정')) {
    // 이모지 추출 (유니코드 이모지)
    const emojiMatch = c.match(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/u);
    // 멤버 이름 추출
    const memberNames = Object.keys(MEMBERS);
    const foundMember = memberNames.find(n => c.includes(n));
    return evts.some(evt => {
      const haystack = (evt.title || '') + (evt.description || '');
      if (emojiMatch && haystack.includes(emojiMatch[0])) return true;
      if (foundMember && (
        haystack.includes(foundMember) || (evt.members || []).includes(foundMember)
      )) return true;
      return false;
    });
  }

  // ── 멤버 이름 직접 기재 (예: "제노") ──
  const memberNames = Object.keys(MEMBERS);
  if (memberNames.includes(c)) {
    return evts.some(evt => (evt.members || []).includes(c));
  }

  return false;
}

function matchDailyCondition(conditionStr, ctx) {
  if (!conditionStr || !conditionStr.trim()) return false;
  // 콤마 또는 줄바꿈으로 분리된 복합 조건은 AND로 처리
  const parts = conditionStr.split(/[,，\n]/).map(s => s.trim()).filter(Boolean);
  if (parts.length === 0) return false;
  // 복합 조건이 없거나 1개이면 단순 매칭
  if (parts.length === 1) return _matchSingleCond(parts[0], ctx);
  // 복합: ALL match (AND)
  return parts.every(p => _matchSingleCond(p, ctx));
}

// ── 가중치 문구 선택 (90/10 법칙) ──
function selectDailyMessage(messages, ctx) {
  if (!messages || !messages.length) {
    return { text:'오늘도 드림과 함께 빛나는 하루 보내요 ✨', member:'💚', condition:'' };
  }
  const priority = messages.filter(m => m.condition && matchDailyCondition(m.condition, ctx));
  const general  = messages.filter(m => !m.condition || !m.condition.trim());

  if (priority.length > 0 && Math.random() < 0.90) {
    return priority[Math.floor(Math.random() * priority.length)];
  }
  if (general.length > 0) {
    return general[Math.floor(Math.random() * general.length)];
  }
  return messages[Math.floor(Math.random() * messages.length)];
}

  [2027, 2, 6, 2027,1,false],
];

function getLunarDate(y, m, d) {
  const t = new Date(y, m-1, d).getTime();
  let res = null;
  for (let i = LUNAR_STARTS.length-1; i >= 0; i--) {
    const [gy,gm,gd,ly,lm,leap] = LUNAR_STARTS[i];
    const s = new Date(gy, gm-1, gd).getTime();
    if (s <= t) {
      const diff = Math.round((t-s)/86400000);
      res = { ly, lm, ld: diff+1, leap };
      break;
    }
  }
  if (!res) return { txt:'', special:false };
  const pre = res.leap ? '윤' : '';
  const txt = `${pre}${res.lm}/${res.ld}`;
  const special = res.ld === 1 || res.ld === 15;
  return { txt, special };
}

// ── RENDER ──
const MONTH_EN = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
const MONTH_KR = ['1월','2월','3월','4월','5월','6월',
                  '7월','8월','9월','10월','11월','12월'];
const DOWS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

function p2(n){ return String(n).padStart(2,'0'); }
function dKey(y,m,d){ return `${y}-${p2(m)}-${p2(d)}`; }

function renderMonth(year, month) {
  const firstDow = new Date(year, month-1, 1).getDay();
  const days = new Date(year, month, 0).getDate();
  const today = new Date();
  const tY = today.getFullYear(), tM = today.getMonth()+1, tD = today.getDate();

  let h = `<div class="month-card" id="month-${month}">
    <div class="month-header">
      <div class="month-accent-bar"></div>
      <div>
        <div class="month-name-en">${MONTH_EN[month-1]}</div>
        <div class="month-name-kr">${MONTH_KR[month-1]}</div>
      </div>
      <span class="month-num">2026</span>
    </div>
    <div class="cal-grid">`;

  DOWS.forEach((d,i) => {
    const cls = i===0 ? ' sun' : i===6 ? ' sat' : '';
    h += `<div class="dow-label${cls}">${d}</div>`;
  });

  for (let i=0; i<firstDow; i++) h += `<div class="day-cell empty"></div>`;

  for (let d=1; d<=days; d++) {
    const key = dKey(year, month, d);
    const dow = (firstDow + d - 1) % 7;
    const isToday = (tY===year && tM===month && tD===d);
    const isHol = !!HOLIDAYS[key];
    const isSun = dow===0;
    const isSat = dow===6;
    const lunar = getLunarDate(year, month, d);

    let cls = 'day-cell';
    if (isToday) cls += ' today';
    if (isHol) cls += ' holiday';
    if (isSun) cls += ' sun-col';
    if (isSat) cls += ' sat-col';

    const evts = (EVENTS[key]||[]).filter(evt =>
      !selectedMember || (evt.members||[]).includes(selectedMember)
    );
    const hasEvt = evts.length > 0;
    if (hasEvt) cls += ' has-event';

    let inner = `<div class="day-top">
      <span class="day-num">${d}${isToday ? '<span class="today-star" style="top:-4px;right:-4px;">✦</span>' : ''}</span>
    </div>`;

    if (isHol) inner += `<div class="holiday-label">🇰🇷 ${HOLIDAYS[key]}</div>`;
    if (HOLIDAYS_JP[key]) inner += `<div class="holiday-label jp">🇯🇵 ${HOLIDAYS_JP[key]}</div>`;
    if (HOLIDAYS_CN[key]) inner += `<div class="holiday-label cn">🇨🇳 ${HOLIDAYS_CN[key]}</div>`;

    evts.forEach(evt => {
      const allEmojis = (evt.members||[]).map(m => MEMBERS[m]||m);
      const mDisplay = allEmojis.length > 2
        ? allEmojis.slice(0,2).join('') + '···'
        : allEmojis.join('');
      const mData = (evt.members||[]).join(',');
      inner += `<div class="event-row" data-members="${mData}">
        <span class="event-title-line">${evt.emoji||''} ${escHtml(evt.title)}</span>
        ${mDisplay ? `<span class="event-members">${mDisplay}</span>` : ''}
      </div>`;
    });

    // 오늘이면 날씨 미니 표시 + 클릭 시 openDailyModal
    if (isToday) {
      const wKey = key;
      inner += `<div class="weather-mini" id="weather-mini-${wKey}">
        <span class="weather-icon">🌤️</span><span>날씨 보기</span>
      </div>`;
      cls += ' has-event';
      h += `<div class="${cls}" onclick="openDailyModal()">${inner}</div>`;
    } else {
      const clickAttr = hasEvt ? `onclick="openModal('${key}')"` : '';
      h += `<div class="${cls}" ${clickAttr}>${inner}</div>`;
    }
  }

  h += `</div></div>`;
  return h;
}

  if (code === 0)              return { icon: isDay?'☀️':'🌙', text:'맑음' };
  if (code <= 2)               return { icon:'⛅', text:'구름조금' };
  if (code === 3)              return { icon:'☁️', text:'흐림' };
  if (code <= 49)              return { icon:'🌫️', text:'안개' };
  if (code <= 59)              return { icon:'🌦️', text:'이슬비' };
  if (code <= 69)              return { icon:'🌧️', text:'비' };
  if (code <= 79)              return { icon:'❄️', text:'눈' };
  if (code <= 82)              return { icon:'🌧️', text:'소나기' };
  if (code <= 84)              return { icon:'🌨️', text:'강한 소나기' };
  if (code <= 99)              return { icon:'⛈️', text:'뇌우' };
  return { icon:'🌤️', text:'보통' };
}

// 풍속 → 강도 텍스트
function getWindText(wsd) {
  const w = parseFloat(wsd);
  if (w < 4)  return '약한 바람';
  if (w < 9)  return '약간 강한 바람';
  if (w < 14) return '강한 바람 🍃';
  return '매우 강한 바람 💨';
}

// 체감온도 계산
function getFeelsLike(tmp, wsd, reh) {
  const t = parseFloat(tmp);
  const w = parseFloat(wsd);
  const h = parseFloat(reh);
  if (t <= 10 && w >= 1.3) {
    return (13.12 + 0.6215*t - 11.37*Math.pow(w*3.6,0.16) + 0.3965*t*Math.pow(w*3.6,0.16)).toFixed(1);
  }
  if (t >= 27) {
    return (-8.78469475556 + 1.61139411*t + 2.3385248808*h
      - 0.14611605*t*h - 0.012308094*t*t
      - 0.016424828*h*h + 0.002211732*t*t*h).toFixed(1);
  }
  return t.toFixed(1);
}

// Open-Meteo API 호출 (오늘 날씨)
async function fetchWeatherData() {
  const url = `https://api.open-meteo.com/v1/forecast`
    + `?latitude=${WEATHER_LAT}&longitude=${WEATHER_LON}`
    + `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,is_day`
    + `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max`
    + `&timezone=Asia%2FSeoul&forecast_days=2`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}

// Open-Meteo 과거 API 호출 (어제 날씨)
async function fetchYesterdayTemp() {
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const dateStr = yesterday.toISOString().slice(0,10);
  const url = `https://historical-forecast-api.open-meteo.com/v1/forecast`
    + `?latitude=${WEATHER_LAT}&longitude=${WEATHER_LON}`
    + `&daily=temperature_2m_max,temperature_2m_min`
    + `&timezone=Asia%2FSeoul`
    + `&start_date=${dateStr}&end_date=${dateStr}`;
  const res = await fetch(url);
  if (!res.ok) return null;
  const json = await res.json();
  // 어제 평균기온 = (최고+최저)/2
  const max = json?.daily?.temperature_2m_max?.[0];
  const min = json?.daily?.temperature_2m_min?.[0];
  if (max == null || min == null) return null;
  return ((max + min) / 2).toFixed(1);
}

  _openModalCore(key, false);
}

const MONTH_KR_FULL = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DOW_KR = ['일','월','화','수','목','금','토'];

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

async function init() {
  // Member legend (마크 제외 - 2026.04.09 탈퇴)
  const legend = document.getElementById('memberLegend');
  legend.innerHTML = Object.entries(MEMBERS)
    .filter(([name]) => name !== '마크')
    .map(([name, emoji]) =>
      `<span class="member-chip" data-name="${name}" onclick="toggleMemberFilter('${name}')">${emoji} ${name}</span>`
    ).join('');

  // Nav pills
  const nav = document.getElementById('monthNav');
  nav.innerHTML = MONTH_KR.map((kr, i) =>
    `<a class="month-pill" href="#month-${i+1}" id="pill-${i+1}">${kr}</a>`
  ).join('');

  // 로딩 표시
  document.getElementById('calContainer').innerHTML = `
    <div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text3);font-family:'DM Mono',monospace;font-size:0.8rem;letter-spacing:0.1em;">
      🐶 제똥이가 일정을 불러오고 있어요
    </div>`;

  // 구글 시트에서 데이터 가져오기 (일정 + 응원 문구 + 오늘의 한마디)
  try {
    const [evtRes, msgRes] = await Promise.all([
      fetch(SHEETS_URL),
      fetch(SHEETS_URL + '?type=messages')
    ]);
    EVENTS = await evtRes.json();
    MESSAGES = await msgRes.json();
  } catch(e) {
    console.error('데이터 로딩 실패:', e);
  }
  // 오늘의 한마디 시트 병렬 프리로드 (모달 오픈 시 빠르게 표시되도록)
  loadDailyMessages().catch(e => console.warn('오늘의문구 프리로드 실패:', e));

  // 캘린더 렌더링
  let cal = '';
  for (let m=1; m<=12; m++) cal += renderMonth(2026, m);
  document.getElementById('calContainer').innerHTML = cal;

  // 현재 월로 스크롤
  const now = new Date();
  const curM = now.getFullYear() === 2026 ? now.getMonth()+1 : 4;
  setTimeout(() => {
    const el = document.getElementById(`month-${curM}`);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
    updatePill(curM);
  }, 120);
}

function updatePill(m) {
  document.querySelectorAll('.month-pill').forEach((p,i) => {
    p.classList.toggle('active', i+1===m);
  });
  const activePill = document.getElementById(`pill-${m}`);
  if (activePill) activePill.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

// Update pill on scroll
let scrollTimer;
window.addEventListener('scroll', () => {
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    const cards = document.querySelectorAll('.month-card');
    const navH = document.getElementById('monthNav').offsetHeight + 40;
    let active = 1;
    cards.forEach((c,i) => {
      if (c.getBoundingClientRect().top <= navH) active = i+1;
    });
    updatePill(active);
  }, 60);
});

init();
</script>
</body>
</html>
