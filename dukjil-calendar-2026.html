<html lang="ko">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --bg: #f4f5ee;
  --surface: #ffffff;
  --surface2: #f0f2e8;
  --border: #e2e5d4;
  --border2: #c8ccb4;
  --text: #1a1c14;
  --text2: #5a5e48;
  --text3: #9a9e88;
  --accent: #C1E145;
  --accent-dark: #6e8a00;
  --accent-dim: rgba(193,225,69,0.18);
  --accent-text: #2a3600;
  --holiday: #d63b3b;
  --holiday-jp: #c4889e;
  --holiday-cn: #c49060;
  --today-bg: #C1E145;
  --today-text: #2a3600;
  --sat: #3a7bd5;
  --sun: #d63b3b;
  --event-bg: rgba(193,225,69,0.13);
  --event-border: #a8cc1a;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  text-align: center;
  padding: 52px 20px 36px;
  position: relative;
  background: var(--surface);
  border-bottom: 3px solid var(--accent);
}
.header-stars {
  font-size: 0.75rem;
  letter-spacing: 0.6em;
  color: var(--text3);
  margin-bottom: 12px;
  font-family: 'DM Mono', monospace;
}
.header-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3.2rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 6px;
}
.header-title span {
  background: var(--accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-sub {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--text3);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-bottom: 24px;
}
.member-legend {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.member-chip {
  font-size: 0.7rem;
  padding: 5px 14px;
  border: 1.5px solid var(--border2);
  border-radius: 20px;
  color: var(--text2);
  background: var(--surface);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.18s ease;
  user-select: none;
  flex-shrink: 0;
}
.member-chip:hover {
  border-color: var(--accent-dark);
  background: var(--accent-dim);
  color: var(--accent-text);
}
.member-chip.active {
  border-color: var(--accent-dark);
  background: var(--accent);
  color: var(--accent-text);
  font-weight: 500;
}
.filter-hint {
  font-family: 'DM Mono', monospace;
  font-size: 0.56rem;
  color: var(--text3);
  margin-top: 12px;
  letter-spacing: 0.08em;
}
.event-row.hidden { display: none; }

/* ── STICKY NAV ── */
.month-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 5px;
  padding: 10px 24px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
@media (max-width: 640px) {
  .month-nav {
    flex-wrap: nowrap;
    justify-content: flex-start;
    overflow-x: auto;
    padding: 10px 14px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .month-nav::-webkit-scrollbar { display: none; }
}
.month-pill {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  font-weight: 400;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border2);
  background: transparent;
  color: var(--text3);
  text-decoration: none;
  transition: all 0.18s ease;
  cursor: pointer;
  letter-spacing: 0.04em;
  flex-shrink: 0;
  white-space: nowrap;
}
.month-pill:hover {
  border-color: var(--accent-dark);
  color: var(--accent-text);
  background: var(--accent-dim);
}
.month-pill.active {
  border-color: var(--accent-dark);
  background: var(--accent);
  color: var(--accent-text);
  font-weight: 500;
}

/* ── CALENDAR GRID ── */
.calendar-container {
  max-width: 1480px;
  margin: 0 auto;
  padding: 32px 24px 60px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
@media (max-width: 1100px) {
  .calendar-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  .calendar-container { grid-template-columns: 1fr; padding: 16px 12px 40px; gap: 16px; }
}

/* ── MONTH CARD ── */
.month-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  scroll-margin-top: 72px;
}

.month-header {
  padding: 20px 28px 16px;
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
}
.month-accent-bar {
  width: 6px; height: 36px;
  background: var(--accent);
  border-radius: 3px;
  flex-shrink: 0;
}
.month-name-en {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.02em;
  line-height: 1;
}
.month-name-kr {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--text3);
  margin-top: 2px;
}
.month-num {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--text3);
  margin-left: auto;
  letter-spacing: 0.1em;
}

/* ── DAY GRID ── */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 10px;
  gap: 3px;
}
.dow-label {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  font-weight: 400;
  letter-spacing: 0.08em;
  padding: 8px 0 6px;
  color: var(--text3);
}
.dow-label.sun { color: var(--sun); }
.dow-label.sat { color: var(--sat); }

.day-cell {
  height: 90px;
  overflow: hidden;
  padding: 5px 5px 6px;
  border-radius: 10px;
  vertical-align: top;
  transition: background 0.12s;
  cursor: default;
}
@media (max-width: 1100px) {
  .day-cell { height: 80px; }
}
.day-cell.has-event { cursor: pointer; }
.day-cell:not(.empty):hover { background: var(--surface2); }
.day-cell.empty { pointer-events: none; }

.day-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 2px;
  margin-bottom: 2px;
}
.day-num {
  font-family: 'DM Mono', monospace;
  font-size: 0.82rem;
  font-weight: 400;
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  line-height: 1;
}
.day-cell.today .day-num {
  background: var(--today-bg);
  color: var(--today-text);
  font-weight: 700;
}
.day-cell.sun-col .day-num { color: var(--sun); }
.day-cell.sat-col .day-num { color: var(--sat); }
.day-cell.holiday .day-num { color: var(--holiday) !important; }
.day-cell.today .day-num { color: var(--today-text) !important; }

.lunar-txt { display: none; }

.holiday-label {
  font-size: 0.48rem;
  color: var(--holiday);
  font-weight: 400;
  line-height: 1.3;
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.holiday-label.jp { color: var(--holiday-jp); }
.holiday-label.cn { color: var(--holiday-cn); }
.event-row {
  font-size: 0.48rem;
  font-weight: 400;
  line-height: 1.35;
  background: var(--event-bg);
  border-left: 2px solid var(--event-border);
  border-radius: 4px;
  padding: 2px 4px;
  margin-top: 2px;
  cursor: pointer;
}
.event-row:hover { background: rgba(193,225,69,0.28); }
.event-title-line {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
  color: var(--text);
}
.event-members {
  font-size: 0.54rem;
  line-height: 1;
  margin-top: 1px;
  display: block;
}

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(30,35,10,0.5);
  backdrop-filter: blur(6px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border: 1.5px solid var(--border2);
  border-radius: 22px;
  padding: 30px;
  max-width: 440px;
  width: 100%;
  position: relative;
  animation: modalIn 0.2s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.12);
}
@keyframes modalIn {
  from { opacity:0; transform: translateY(14px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
.modal-date {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--text3);
  letter-spacing: 0.15em;
  margin-bottom: 6px;
}
.modal-holiday {
  font-size: 0.72rem;
  color: var(--holiday);
  margin-bottom: 14px;
}
.modal-event {
  background: var(--event-bg);
  border-left: 3px solid var(--event-border);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 10px;
}
.modal-event-title {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.5;
  word-break: keep-all;
  margin-bottom: 8px;
}
.modal-event-members {
  font-size: 1rem;
  letter-spacing: 0.1em;
}
.modal-close {
  position: absolute;
  top: 16px; right: 18px;
  background: var(--surface2);
  border: 1.5px solid var(--border2);
  border-radius: 50%;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 0.75rem;
  color: var(--text2);
  transition: all 0.15s;
}
.modal-close:hover { background: var(--accent); color: var(--accent-text); border-color: var(--accent-dark); }

/* ── MOBILE ── */
@media (max-width: 640px) {
  header { padding: 32px 16px 24px; }
  .header-title { font-size: 2.2rem; }
  .header-sub { font-size: 0.56rem; }
  .member-legend { gap: 6px; overflow-x: auto; flex-wrap: nowrap; justify-content: flex-start; padding: 0 4px; scrollbar-width: none; }
  .member-legend::-webkit-scrollbar { display: none; }
  .member-chip { font-size: 0.64rem; padding: 4px 10px; }

  .calendar-container { padding: 16px 12px 40px; gap: 16px; }
  .month-card { border-radius: 16px; scroll-margin-top: 60px; }
  .month-header { padding: 14px 16px 12px; }
  .month-name-en { font-size: 1.4rem; }
  .month-accent-bar { width: 5px; height: 28px; }

  .cal-grid { padding: 6px; gap: 2px; }
  .dow-label { font-size: 0.52rem; padding: 5px 0 4px; }
  .day-cell { height: 72px; padding: 3px 3px 4px; }
  .day-num { font-size: 0.72rem; width: 22px; height: 22px; }
  .holiday-label { font-size: 0.42rem; }
  .event-row { font-size: 0.42rem; padding: 1px 3px; }
  .event-members { font-size: 0.48rem; }
}

footer {
  text-align: center;
  padding: 28px;
  border-top: 1.5px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--text3);
  letter-spacing: 0.2em;
  background: var(--surface);
}
</style>
</head>

  const t = new Date(y, m-1, d).getTime();
  let res = null;
  for (let i = LUNAR_STARTS.length-1; i >= 0; i--) {
    const [gy,gm,gd,ly,lm,leap] = LUNAR_STARTS[i];

    }
  }
  if (!res) return { txt:'', special:false };
  const pre = res.leap ? '윤' : '';
  const txt = `${pre}${res.lm}/${res.ld}`;
  const special = res.ld === 1 || res.ld === 15;
  return { txt, special };
}

// ── RENDER ──
const MONTH_EN = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
const MONTH_KR = ['1월','2월','3월','4월','5월','6월',
                  '7월','8월','9월','10월','11월','12월'];
const DOWS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

function p2(n){ return String(n).padStart(2,'0'); }
function dKey(y,m,d){ return `${y}-${p2(m)}-${p2(d)}`; }

function renderMonth(year, month) {
  const firstDow = new Date(year, month-1, 1).getDay();
  const days = new Date(year, month, 0).getDate();
  const today = new Date();
  const tY = today.getFullYear(), tM = today.getMonth()+1, tD = today.getDate();

  let h = `<div class="month-card" id="month-${month}">
    <div class="month-header">
      <div class="month-accent-bar"></div>
      <div>
        <div class="month-name-en">${MONTH_EN[month-1]}</div>
        <div class="month-name-kr">${MONTH_KR[month-1]}</div>
      </div>
      <span class="month-num">2026</span>
    </div>
    <div class="cal-grid">`;

  DOWS.forEach((d,i) => {
    const cls = i===0 ? ' sun' : i===6 ? ' sat' : '';
    h += `<div class="dow-label${cls}">${d}</div>`;
  });

  for (let i=0; i<firstDow; i++) h += `<div class="day-cell empty"></div>`;

  for (let d=1; d<=days; d++) {
    const key = dKey(year, month, d);
    const dow = (firstDow + d - 1) % 7;
    const isToday = (tY===year && tM===month && tD===d);
    const isHol = !!HOLIDAYS[key];
    const isSun = dow===0;
    const isSat = dow===6;
    const lunar = getLunarDate(year, month, d);

    let cls = 'day-cell';
    if (isToday) cls += ' today';
    if (isHol) cls += ' holiday';
    if (isSun) cls += ' sun-col';
    if (isSat) cls += ' sat-col';

    const evts = (EVENTS[key]||[]).filter(evt =>
      !selectedMember || (evt.members||[]).includes(selectedMember)
    );
    const hasEvt = evts.length > 0;
    if (hasEvt) cls += ' has-event';

    let inner = `<div class="day-top">
      <span class="day-num">${d}</span>
    </div>`;

    if (isHol) inner += `<div class="holiday-label">🇰🇷 ${HOLIDAYS[key]}</div>`;
    if (HOLIDAYS_JP[key]) inner += `<div class="holiday-label jp">🇯🇵 ${HOLIDAYS_JP[key]}</div>`;
    if (HOLIDAYS_CN[key]) inner += `<div class="holiday-label cn">🇨🇳 ${HOLIDAYS_CN[key]}</div>`;

    evts.forEach(evt => {
      const allEmojis = (evt.members||[]).map(m => MEMBERS[m]||m);
      const mDisplay = allEmojis.length > 2
        ? allEmojis.slice(0,2).join('') + '···'
        : allEmojis.join('');
      const mData = (evt.members||[]).join(',');
      inner += `<div class="event-row" data-members="${mData}">
        <span class="event-title-line">${evt.emoji||''} ${escHtml(evt.title)}</span>
        ${mDisplay ? `<span class="event-members">${mDisplay}</span>` : ''}
      </div>`;
    });

    const clickAttr = hasEvt ? `onclick="openModal('${key}')"` : '';
    h += `<div class="${cls}" ${clickAttr}>${inner}</div>`;
  }

  h += `</div></div>`;
  return h;
}

// ── MODAL ──
function applyFilter() {
  let cal = '';
  for (let m=1; m<=12; m++) cal += renderMonth(2026, m);
  document.getElementById('calContainer').innerHTML = cal;
  document.querySelectorAll('.member-chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.name === selectedMember);
  });
  const hint = document.getElementById('filterHint');
  if (hint) hint.textContent = selectedMember
    ? `${MEMBERS[selectedMember]} ${selectedMember} 일정만 표시 중 · 다시 누르면 전체 보기`
    : '멤버를 눌러 필터링할 수 있어요';
}

function toggleMemberFilter(name) {
  selectedMember = selectedMember === name ? null : name;
  applyFilter();
}

// ── MODAL ──
const MONTH_KR_FULL = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DOW_KR = ['일','월','화','수','목','금','토'];

function openModal(key) {
  const [y, m, d] = key.split('-').map(Number);
  const dow = new Date(y, m-1, d).getDay();
  const evts = EVENTS[key] || [];
  const hol = HOLIDAYS[key];

  let html = `<div class="modal-date">2026 · ${MONTH_KR_FULL[m-1]} ${d}일 (${DOW_KR[dow]})</div>`;
  if (hol) html += `<div class="modal-holiday">🇰🇷 ${hol}</div>`;
  if (HOLIDAYS_JP[key]) html += `<div class="modal-holiday" style="color:var(--holiday-jp)">🇯🇵 ${HOLIDAYS_JP[key]}</div>`;
  if (HOLIDAYS_CN[key]) html += `<div class="modal-holiday" style="color:var(--holiday-cn)">🇨🇳 ${HOLIDAYS_CN[key]}</div>`;

  if (evts.length === 0) {
    html += `<div style="color:var(--text3);font-size:0.78rem;margin-top:8px;">등록된 일정이 없어요</div>`;
  } else {
    evts.forEach(evt => {
      const mEmojis = (evt.members||[]).map(n => `<span style="font-size:1.3rem">${MEMBERS[n]||n}</span> <span style="font-size:0.72rem;color:var(--text2)">${n}</span>`).join('  ');
      const flag = getFlag(evt.location);
      html += `<div class="modal-event">
        <div class="modal-event-title">${evt.emoji||''} ${escHtml(evt.title)}</div>
        ${evt.location ? `<div style="font-size:0.72rem;color:var(--text2);font-family:'DM Mono',monospace;margin-top:5px;">📍 ${flag} ${evt.location}</div>` : ''}
        ${evt.time ? `<div style="font-size:0.72rem;color:var(--accent-dark);font-family:'DM Mono',monospace;margin-top:4px;">⏰ ${evt.time}</div>` : ''}
        ${mEmojis ? `<div class="modal-event-members" style="margin-top:8px;">${mEmojis}</div>` : ''}
      </div>`;
    });
  }

  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

async function init() {
  // Member legend (마크 제외 - 2026.04.09 탈퇴)
  const legend = document.getElementById('memberLegend');
  legend.innerHTML = Object.entries(MEMBERS)
    .filter(([name]) => name !== '마크')
    .map(([name, emoji]) =>
      `<span class="member-chip" data-name="${name}" onclick="toggleMemberFilter('${name}')">${emoji} ${name}</span>`
    ).join('');

  // Nav pills
  const nav = document.getElementById('monthNav');
  nav.innerHTML = MONTH_KR.map((kr, i) =>
    `<a class="month-pill" href="#month-${i+1}" id="pill-${i+1}">${kr}</a>`
  ).join('');

  // 로딩 표시
  document.getElementById('calContainer').innerHTML = `
    <div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text3);font-family:'DM Mono',monospace;font-size:0.8rem;letter-spacing:0.1em;">
      ✦ 일정 불러오는 중 ✦
    </div>`;

  // 구글 시트에서 데이터 가져오기
  try {
    const res = await fetch(SHEETS_URL);
    EVENTS = await res.json();
  } catch(e) {
    console.error('일정 로딩 실패:', e);
  }

  // 캘린더 렌더링
  let cal = '';
  for (let m=1; m<=12; m++) cal += renderMonth(2026, m);
  document.getElementById('calContainer').innerHTML = cal;

  // 현재 월로 스크롤
  const now = new Date();
  const curM = now.getFullYear() === 2026 ? now.getMonth()+1 : 4;
  setTimeout(() => {
    const el = document.getElementById(`month-${curM}`);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
    updatePill(curM);
  }, 120);
}

function updatePill(m) {
  document.querySelectorAll('.month-pill').forEach((p,i) => {
    p.classList.toggle('active', i+1===m);
  });
  const activePill = document.getElementById(`pill-${m}`);
  if (activePill) activePill.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

// Update pill on scroll
let scrollTimer;
window.addEventListener('scroll', () => {
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    const cards = document.querySelectorAll('.month-card');
    const navH = document.getElementById('monthNav').offsetHeight + 40;
    let active = 1;
    cards.forEach((c,i) => {
      if (c.getBoundingClientRect().top <= navH) active = i+1;
    });
    updatePill(active);
  }, 60);
});

init();
</script>
